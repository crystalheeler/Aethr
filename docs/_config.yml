title: Aethr
description: Signal Intelligence Platform - A web-based interface for software-defined radio tools
# url + baseurl intentionally unset — when GitHub Pages is enabled on
# the Aethr repo it will pick the right values; leaving the upstream's
# smittix.github.io URL here would deploy the site to the wrong place.

# Build settings
include:
  - _headers

# Exclude files from build
exclude:
  - README.md
  - SECURITY.md
  - TROUBLESHOOTING.md
  - USAGE.md
  - FEATURES.md
  - HARDWARE.md
  - DISTRIBUTED_AGENTS.md
