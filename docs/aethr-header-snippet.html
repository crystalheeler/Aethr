<!-- AFTER (ÆTHR): -->
<header class="header ae-header">
    <div class="logo ae-logo">
        <img class="ae-emblem" src="/static/img/aethr/aethr-emblem.png" alt="ÆTHR">
        <img class="ae-wordmark" src="/static/img/aethr/aethr-wordmark.png" alt="ÆTHR — AIRCRAFT">

       (a) per-mode wordmark images: src="/static/img/aethr/aethr-wordmark-<mode>.png"
       (b) live text lockup (see the commented block in aethr-titlebar.css),
           e.g.:
             <div class="ae-brand">

             </div>
     Match either approach visually to the approved Aircraft bar before locking. -->
