name: Build Windows Decoders

# Builds Windows binaries for the aviation-datalink decoders that have no
# official Windows release: acarsdec (ACARS) and — later — dumpvdl2 (VDL2).
#
# These are built from source with MSYS2 / mingw-w64 because there are no
# prebuilt Windows binaries upstream. The decoders are Linux-first and pull in
# a few POSIX headers mingw lacks; we satisfy those with the shim headers in
# tools/windows/wincompat/ (added to the include path) plus -Dffs / -lws2_32.
#
# The resulting .exe + runtime DLLs are uploaded as an artifact; a maintainer
# downloads them and commits them to tools/windows/ so the release build
# bundles them.
#
# Trigger: manual only (workflow_dispatch). This is a one-off / occasional
# build, not part of every release.

on:
  workflow_dispatch:

jobs:
  acarsdec:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout (for wincompat shims)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-cjson
            mingw-w64-x86_64-winpthreads

      - name: Build libacars
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/szpajder/libacars.git
          cd libacars
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$MINGW_PREFIX" \
            ..
          ninja
          ninja install
          echo "libacars: $(pkg-config --modversion libacars-2 || echo '??')"

      - name: Build acarsdec (f00b4r0 fork)
        run: |
          set -euo pipefail
          # wincompat shims live in the checked-out repo. Convert to a
          # mingw-friendly (forward-slash) path for the -I flag.
          WINCOMPAT="$(cygpath -m "$GITHUB_WORKSPACE")/tools/windows/wincompat"
          echo "wincompat: $WINCOMPAT"
          ls -la "$WINCOMPAT"

          git clone https://github.com/f00b4r0/acarsdec.git
          cd acarsdec
          # Pin to the commit the wincompat shims were written against.
          git checkout 206f733027131d514454c4208d3acc986c9f9a28
          mkdir build && cd build
          # Only RTL-SDR input + JSON-to-stdout output are needed. The shim
          # include dir satisfies <sys/socket.h>/<netdb.h>/<err.h>/<sysexits.h>;
          # -Dffs maps POSIX ffs to the GCC builtin; -lws2_32 provides Winsock.
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRTLSDR=ON \
            -DLIBACARS=ON \
            -DCJSON=ON \
            -DALSA=OFF \
            -DMQTT=OFF \
            -DSNDFILE=OFF \
            -DSOAPY=OFF \
            -DAIRSPY=OFF \
            -DSDRPLAY=OFF \
            -DCMAKE_C_FLAGS="-I${WINCOMPAT} -include ${WINCOMPAT}/win_posix_compat.h -Dffs=__builtin_ffs" \
            -DCMAKE_C_STANDARD_LIBRARIES="-lws2_32" \
            ..
          ninja -v

      - name: Collect binary + runtime DLLs
        run: |
          set -uo pipefail
          OUT="$GITHUB_WORKSPACE/acarsdec-dist"
          mkdir -p "$OUT"
          cp acarsdec/build/acarsdec.exe "$OUT/"
          cp "$MINGW_PREFIX/bin/libacars-2.dll" "$OUT/" 2>/dev/null || true
          # Walk ldd output and copy every mingw64-provided DLL dependency.
          ldd "$OUT/acarsdec.exe" | awk '/mingw64/ {print $3}' | while read -r dll; do
            [ -f "$dll" ] && cp -n "$dll" "$OUT/" || true
          done
          echo "=== bundled files ==="
          ls -la "$OUT"
          echo "=== ldd acarsdec.exe ==="
          ldd "$OUT/acarsdec.exe" || true

      - name: Smoke-test the binary
        run: |
          set -uo pipefail
          # No-arg run prints usage and exits non-zero; we just want to confirm
          # the exe loads with no missing-DLL error.
          ./acarsdec-dist/acarsdec.exe 2>&1 | head -8 || true
          echo "exit: smoke complete"

      - name: Upload acarsdec artifact
        uses: actions/upload-artifact@v4
        with:
          name: acarsdec-windows-x64
          path: acarsdec-dist/
          retention-days: 14

  multimon-ng:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Build multimon-ng
        run: |
          set -euo pipefail
          # multimon-ng reads audio from stdin (no SDR dependency); X11 and
          # PulseAudio auto-disable on Windows. It's fairly portable, so try a
          # plain build first.
          git clone --depth 1 https://github.com/EliasOenal/multimon-ng.git
          cd multimon-ng
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja -v

      - name: Collect binary + runtime DLLs
        run: |
          set -uo pipefail
          OUT="$GITHUB_WORKSPACE/multimon-ng-dist"
          mkdir -p "$OUT"
          cp multimon-ng/build/multimon-ng.exe "$OUT/"
          ldd "$OUT/multimon-ng.exe" | awk '/mingw64/ {print $3}' | while read -r dll; do
            [ -f "$dll" ] && cp -n "$dll" "$OUT/" || true
          done
          echo "=== bundled files ==="; ls -la "$OUT"
          echo "=== ldd ==="; ldd "$OUT/multimon-ng.exe" || true

      - name: Smoke-test the binary
        run: |
          set -uo pipefail
          ./multimon-ng-dist/multimon-ng.exe -h 2>&1 | head -8 || true
          echo "exit: smoke complete"

      - name: Upload multimon-ng artifact
        uses: actions/upload-artifact@v4
        with:
          name: multimon-ng-windows-x64
          path: multimon-ng-dist/
          retention-days: 14

  dumpvdl2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout (for wincompat shims)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-zlib

      - name: Build libacars
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/szpajder/libacars.git
          cd libacars
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$MINGW_PREFIX" \
            ..
          ninja
          ninja install

      - name: Build dumpvdl2
        run: |
          set -euo pipefail
          WINCOMPAT="$(cygpath -m "$GITHUB_WORKSPACE")/tools/windows/wincompat"
          git clone --depth 1 https://github.com/szpajder/dumpvdl2.git
          cd dumpvdl2
          mkdir build && cd build
          # Reuse the same POSIX shims acarsdec needed (sockets→Winsock,
          # err.h, gmtime_r, etc.); glib + libacars + librtlsdr come from
          # mingw / the libacars build above. Link ws2_32 last.
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-I${WINCOMPAT} -include ${WINCOMPAT}/win_posix_compat.h" \
            -DCMAKE_C_STANDARD_LIBRARIES="-lws2_32" \
            ..
          ninja -v

      - name: Collect binary + runtime DLLs
        run: |
          set -uo pipefail
          OUT="$GITHUB_WORKSPACE/dumpvdl2-dist"
          mkdir -p "$OUT"
          cp dumpvdl2/build/dumpvdl2.exe "$OUT/"
          cp "$MINGW_PREFIX/bin/libacars-2.dll" "$OUT/" 2>/dev/null || true
          ldd "$OUT/dumpvdl2.exe" | awk '/mingw64/ {print $3}' | while read -r dll; do
            [ -f "$dll" ] && cp -n "$dll" "$OUT/" || true
          done
          echo "=== bundled files ==="; ls -la "$OUT"
          echo "=== ldd ==="; ldd "$OUT/dumpvdl2.exe" || true

      - name: Smoke-test the binary
        run: |
          set -uo pipefail
          ./dumpvdl2-dist/dumpvdl2.exe --version 2>&1 | head -8 || true
          ./dumpvdl2-dist/dumpvdl2.exe 2>&1 | head -8 || true
          echo "exit: smoke complete"

      - name: Upload dumpvdl2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dumpvdl2-windows-x64
          path: dumpvdl2-dist/
          retention-days: 14
